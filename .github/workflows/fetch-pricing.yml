name: Fetch Pricing

on:
  schedule:
    # 每30分钟探测一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch pricing data
        id: fetch
        run: node scripts/fetch-pricing.js

      - name: Commit changes
        if: steps.fetch.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update pricing data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
